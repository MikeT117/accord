edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

import "google/protobuf/timestamp.proto";

message RelationshipUpdated {
    int32 ver = 1;
    string id = 2;
    int32 status = 3;
    google.protobuf.Timestamp updated_at = 4;
}

message RelationshipDeleted {
    int32 ver = 1;
    string id = 2;
}