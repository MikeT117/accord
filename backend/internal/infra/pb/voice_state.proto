edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

import "user.proto";

message VoiceState {
    int32 ver = 1;
    string id = 2;
    bool self_mute = 3;
    bool self_deaf = 4;
    string channel_id = 5;
    User user = 10;
    string guild_id = 7;
}
