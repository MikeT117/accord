edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

/*
Events such as creating messages (in user channels), user channels, relationships, etc.
The user_ids defines which clients recieve the event.
*/

message UserEvent {
    int32 ver = 1;
    int32 op = 2;
    bytes data = 3;
    repeated string user_ids = 4;
}