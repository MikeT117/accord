edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

import "google/protobuf/timestamp.proto";

message ChannelUpdated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string parent_id = 4;
    string name = 5;
    string topic = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message ChannelDeleted {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
}