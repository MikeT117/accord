edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

message ChannelUpdated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string parent_id = 4;
    string name = 5;
    string topic = 6;
    int64 updated_at = 7;
}

message ChannelRolesSet {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    repeated string role_ids = 4;
}

message ChannelRoleAssociated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string role_id = 4;
}

message ChannelRoleDisassociated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string role_id = 4;
}

message ChannelDeleted {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
}