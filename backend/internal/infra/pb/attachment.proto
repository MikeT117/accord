edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

import "google/protobuf/timestamp.proto";

message Attachment {
    int32 ver = 1;
    string id = 2;
    string resource_type = 3;
    string owner_id = 4;
    int64 height = 5;
    int64 width = 6;
    int64 filesize = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    int32 status = 10;
}
