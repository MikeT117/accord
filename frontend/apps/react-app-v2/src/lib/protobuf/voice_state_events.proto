edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

message VoiceStateUpdated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string channel_id = 4;
    bool self_mute = 5;
    bool self_deaf = 6;
}

message VoiceStateDeleted {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string channel_id = 4;
}
