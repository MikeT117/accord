edition = "2023";

package pb;
option go_package = "github.com/MikeT117/accord/backend/internal/infra/pb";

message GuildRoleUpdated {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
    string name = 4;
    int32 permissions = 5;
    int64 updated_at = 6;
}

message GuildRoleDeleted {
    int32 ver = 1;
    string id = 2;
    string guild_id = 3;
}