name: "accord_dev"
services:
    db:
        env_file:
            - .env
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
        image: postgres:16-alpine
        ports:
            - 5432:5432
        networks:
            accord_dev_network:
                aliases:
                    - database
        restart: unless-stopped
        volumes:
            - database_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    init:
        env_file:
            - .env
        image: accord_init
        networks:
            accord_dev_network:
        depends_on:
            db:
                condition: service_healthy

    nats:
        env_file:
            - .env
        image: nats:alpine
        ports:
            - 4222:4222
            - 6222:6222
            - 8222:8222
        networks:
            accord_dev_network:
                aliases:
                    - message_queue
        command: -D -n accord_nats --user ${NATS_USER} -pass ${NATS_PASSWORD} -m 8222
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8222/healthz || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    database_data:
networks:
    accord_dev_network:
        name: accord_dev_network
